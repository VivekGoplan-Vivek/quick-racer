<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race to Goa 🏎️</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="game-container"></div>

  <!-- Start overlay -->
  <div id="start-screen" class="overlay active">
    <h1 class="neon-title">🏎️ RACE TO GOA</h1>
    <p class="tagline">Race through the city — answer to refuel — dodge the Bugs!</p>
    <p class="rules">5 random questions • Wrong answer = Breakdown • Hit a 🔴 Bug = Game Over</p>
    <div id="racer-form">
      <input id="racer-name" type="text" placeholder="Name of Racer" maxlength="24" autocomplete="off" />
      <input id="pod-name"   type="text" placeholder="Name of Pod"   maxlength="24" autocomplete="off" />
    </div>
    <button id="start-btn" class="arcade-btn pulse-btn" disabled>🔑 START ENGINE</button>
    <p id="form-hint" class="form-hint">Enter both names to begin</p>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="fuel-section">
      <span id="fuel-label">⛽ FUEL</span>
      <div id="fuel-bar-bg">
        <div id="fuel-bar"></div>
        <div id="fuel-flash"></div>
      </div>
      <span id="fuel-pct">100%</span>
    </div>
    <div id="hud-right">
      <span id="hud-speed">🏎️ 0 km/h</span>
      <span id="hud-q">❓ 0 / 5</span>
    </div>
  </div>

  <!-- Top Timer -->
  <div id="top-timer">
    <span id="top-timer-label">⏱️ TIME</span>
    <span id="top-timer-value">30</span>
  </div>

  <!-- Question bar -->
  <div id="question-bar" class="hidden">
    <div id="q-header">
      <span id="q-number">Question 1 / 5</span>
      <span id="q-timer">⏱️ <span id="timer">15</span>s</span>
    </div>
    <div id="q-text"></div>
    <div id="q-options"></div>
  </div>

  <!-- Feedback toast -->
  <div id="feedback" class="hidden"></div>

  <!-- End overlay -->
  <div id="end-screen" class="overlay hidden">
    <h1 id="end-title"></h1>
    <p id="end-message"></p>
    <div id="leaderboard-section" class="hidden">
      <h2 class="lb-title">🏆 LEADERBOARD</h2>
      <table id="leaderboard-table">
        <thead><tr><th>#</th><th>Racer</th><th>Pod</th><th>Score</th></tr></thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
    <button id="restart-btn" class="arcade-btn">🔄 RACE AGAIN</button>
  </div>

  <script src="questions.js"></script>
  <script src="game.js"></script>
</body>
</html>
